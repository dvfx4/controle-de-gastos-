<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro IA</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Controle Financeiro IA</h1>

        <div id="chat"></div>

        <div class="entrada">

            <input
                type="text"
                id="mensagem"
                placeholder="Ex: gastei 34 de uber hoje"
                onkeydown="if(event.key==='Enter') enviarMensagem()"
            >

            <button onclick="enviarMensagem()">
                Enviar
            </button>

        </div>

    </div>

    <script src="banco.js"></script>
    <script src="script.js"></script>

</body>
</html>
